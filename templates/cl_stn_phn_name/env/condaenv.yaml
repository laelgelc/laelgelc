# Conda environment clean up and set up procedure
# Download 'condaenv.yaml'
# Open an Anaconda Prompt terminal
# cd Downloads
# conda env list
# conda remove --name my_env --all
# conda env create --file condaenv.yaml
# conda activate my_env
# conda list
# conda deactivate
# exit
